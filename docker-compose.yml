# Lumiqe — Development Services
# Start: docker compose up -d
# Stop:  docker compose down
# Reset: docker compose down -v (deletes data)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lumiqe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lumiqe_dev}
    ports:
      - "5432:5432"
    volumes:
      - lumiqe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lumiqe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - lumiqe_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lumiqe_pgdata:
  lumiqe_redis:
