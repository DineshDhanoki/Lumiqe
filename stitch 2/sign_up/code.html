<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&amp;family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;family=DM+Sans:wght@100;200;300;400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#5e1322",
                    "on-primary": "#412d00",
                    "on-secondary-container": "#b5abff",
                    "surface-variant": "#353437",
                    "outline-variant": "#4f4537",
                    "on-surface": "#e5e1e4",
                    "on-tertiary-container": "#651927",
                    "inverse-surface": "#e5e1e4",
                    "surface-dim": "#131315",
                    "primary": "#f0bf62",
                    "secondary-fixed": "#e4dfff",
                    "on-background": "#e5e1e4",
                    "inverse-primary": "#7c5800",
                    "on-tertiary-fixed": "#40000f",
                    "surface-container-high": "#2a2a2c",
                    "secondary-fixed-dim": "#c7bfff",
                    "secondary-container": "#44369c",
                    "on-error": "#690005",
                    "tertiary": "#ffb2b9",
                    "surface-container-lowest": "#0e0e10",
                    "on-secondary": "#2d1a85",
                    "primary-container": "#c4973e",
                    "surface-container": "#201f22",
                    "primary-fixed": "#ffdea7",
                    "on-error-container": "#ffdad6",
                    "tertiary-fixed-dim": "#ffb2b9",
                    "secondary": "#c7bfff",
                    "on-secondary-fixed-variant": "#44369c",
                    "on-primary-fixed-variant": "#5e4200",
                    "tertiary-container": "#e87f8b",
                    "surface-tint": "#f0bf62",
                    "inverse-on-surface": "#313032",
                    "outline": "#9b8f7e",
                    "error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#7c2a37",
                    "on-surface-variant": "#d2c5b2",
                    "primary-fixed-dim": "#f0bf62",
                    "on-secondary-fixed": "#180065",
                    "surface-bright": "#39393b",
                    "surface-container-low": "#1c1b1d",
                    "surface": "#131315",
                    "tertiary-fixed": "#ffdadc",
                    "background": "#131315",
                    "surface-container-highest": "#353437",
                    "on-primary-fixed": "#271900",
                    "error": "#ffb4ab",
                    "on-primary-container": "#483100"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "editorial": ["Cormorant Garamond"],
                    "mono": ["JetBrains Mono"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(19, 19, 21, 0.4);
            backdrop-filter: blur(16px);
        }
        .ghost-border {
            border: 0.5px solid rgba(196, 151, 62, 0.2);
        }
        .floating-label-group:focus-within label,
        .floating-label-group input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #f0bf62;
        }
        .blob-gold {
            background: radial-gradient(circle, rgba(196, 151, 62, 0.15) 0%, rgba(196, 151, 62, 0) 70%);
            filter: blur(60px);
        }
        .blob-lavender {
            background: radial-gradient(circle, rgba(139, 127, 232, 0.12) 0%, rgba(139, 127, 232, 0) 70%);
            filter: blur(80px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex items-center justify-center overflow-hidden">
<!-- Decorative Blurred Blobs -->
<div class="absolute top-[-10%] right-[-5%] w-[600px] h-[600px] blob-gold rounded-full z-0"></div>
<div class="absolute bottom-[-15%] left-[-10%] w-[800px] h-[800px] blob-lavender rounded-full z-0"></div>
<div class="absolute top-[20%] left-[10%] w-[400px] h-[400px] blob-gold opacity-50 rounded-full z-0"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-lg px-6 py-12">
<div class="glass-card ghost-border rounded-3xl p-10 md:p-14 shadow-2xl">
<!-- Brand & Header -->
<header class="text-center mb-12">
<span class="font-editorial italic text-primary text-4xl block mb-2 tracking-tighter">Lumiqe</span>
<h1 class="font-editorial italic text-3xl text-on-surface tracking-tight">Create Account</h1>
<p class="font-label text-xs uppercase tracking-[0.2em] text-outline mt-4">Join the digital atelier</p>
</header>
<!-- Sign Up Form -->
<form action="#" class="space-y-10">
<!-- Name Field -->
<div class="relative floating-label-group">
<input class="block w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary text-on-surface transition-colors duration-300" id="name" name="name" placeholder=" " type="text"/>
<label class="absolute left-0 top-3 font-label text-sm text-outline transition-all duration-300 pointer-events-none uppercase tracking-widest" for="name">
                        Full Name
                    </label>
</div>
<!-- Email Field -->
<div class="relative floating-label-group">
<input class="block w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary text-on-surface transition-colors duration-300" id="email" name="email" placeholder=" " type="email"/>
<label class="absolute left-0 top-3 font-label text-sm text-outline transition-all duration-300 pointer-events-none uppercase tracking-widest" for="email">
                        Email Address
                    </label>
</div>
<!-- Password Field Group -->
<div class="space-y-4">
<div class="relative floating-label-group">
<input class="block w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary text-on-surface transition-colors duration-300" id="password" name="password" placeholder=" " type="password"/>
<label class="absolute left-0 top-3 font-label text-sm text-outline transition-all duration-300 pointer-events-none uppercase tracking-widest" for="password">
                            Password
                        </label>
</div>
<!-- Password Strength Meter -->
<div class="space-y-2">
<div class="flex gap-1.5 h-1">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
</div>
<div class="flex justify-between items-center">
<span class="font-mono text-[10px] text-primary uppercase tracking-tighter">Strength: Medium</span>
<span class="material-symbols-outlined text-sm text-outline cursor-help" data-icon="info">info</span>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 bg-transparent border-outline-variant rounded-sm text-primary focus:ring-0 focus:ring-offset-0" id="terms" name="terms" type="checkbox"/>
</div>
<label class="text-[11px] text-outline font-label leading-relaxed uppercase tracking-wider" for="terms">
                        I agree to the <a class="text-primary hover:text-primary-fixed transition-colors" href="#">Privacy Policy</a> and <a class="text-primary hover:text-primary-fixed transition-colors" href="#">Terms of Service</a>.
                    </label>
</div>
<!-- Submit Button -->
<button class="group relative w-full py-4 bg-primary-container hover:bg-primary transition-all duration-500 rounded-[10px] overflow-hidden" type="submit">
<div class="absolute inset-0 bg-gradient-to-r from-primary/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="relative z-10 font-headline font-bold text-on-primary uppercase tracking-[0.3em] text-xs">
                        Sign Up
                    </span>
</button>
</form>
<!-- Footer Link -->
<footer class="mt-12 text-center">
<p class="font-label text-xs text-outline tracking-wider uppercase">
                    Already an initiate? 
                    <a class="text-primary font-bold ml-2 hover:underline underline-offset-4 decoration-[0.5px] transition-all" href="#">Sign In</a>
</p>
</footer>
</div>
<!-- Editorial Footnote -->
<div class="mt-8 flex justify-center items-center gap-6 opacity-30">
<span class="font-mono text-[9px] uppercase tracking-widest text-outline">v2.04 Editorial Core</span>
<div class="h-[1px] w-12 bg-outline-variant"></div>
<span class="font-mono text-[9px] uppercase tracking-widest text-outline">SECURED VIA LUMIQE AI</span>
</div>
</main>
</body></html>
