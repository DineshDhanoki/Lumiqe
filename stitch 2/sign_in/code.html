<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In | Lumiqe</title>

        tailwind.config = {
            darkMode: "class",

                extend: {
                    "colors": {
                        "on-tertiary": "#5e1322",

                        "on-surface": "#e5e1e4",

                        "primary": "#f0bf62",
                        "secondary-fixed": "#e4dfff",
                        "on-background": "#e5e1e4",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(19, 19, 21, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .ghost-border {
            border: 0.5px solid rgba(196, 151, 62, 0.2);
        }
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.15;
        }
        .floating-label-input:focus-within label,
        .floating-label-input input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #f0bf62;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary-container/30 overflow-hidden">
<!-- Ambient Background Blobs -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="blob bg-primary top-[-10%] left-[-10%]"></div>
<div class="blob bg-secondary bottom-[-10%] right-[-10%]"></div>
<div class="blob bg-tertiary-container top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-10"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex min-h-screen items-center justify-center p-6 lg:p-12">
<!-- Center Auth Card -->
<div class="glass-card ghost-border w-full max-w-[480px] rounded-[24px] overflow-hidden p-8 md:p-12 shadow-2xl">
<!-- Logo Section -->
<div class="flex justify-center mb-12">
<span class="font-['Cormorant_Garamond'] text-3xl italic tracking-tighter text-primary">Lumiqe</span>
</div>
<!-- Header Section -->
<div class="mb-10 text-center">
<h1 class="font-['Cormorant_Garamond'] text-4xl italic text-white mb-2">Welcome back</h1>
<p class="font-label text-xs uppercase tracking-[0.2em] text-outline opacity-70">Enter your credentials to access the atelier</p>
</div>
<!-- Sign In Form -->
<form action="#" class="space-y-8" method="POST">
<!-- Email Field -->
<div class="relative floating-label-input group">
<input class="block w-full px-0 py-2 bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary transition-colors text-on-surface font-body" id="email" name="email" placeholder=" " required="" type="email"/>
<label class="absolute left-0 top-2 font-label text-xs uppercase tracking-widest text-outline transition-all duration-200 pointer-events-none" for="email">Email Address</label>
</div>
<!-- Password Field -->
<div class="relative floating-label-input group">
<input class="block w-full px-0 py-2 bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary transition-colors text-on-surface font-body" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="absolute left-0 top-2 font-label text-xs uppercase tracking-widest text-outline transition-all duration-200 pointer-events-none" for="password">Password</label>
<button class="absolute right-0 top-2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Remember / Forgot Row -->
<div class="flex items-center justify-between font-label text-[10px] uppercase tracking-widest">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-3 h-3 bg-transparent border-outline-variant rounded-sm text-primary focus:ring-offset-0 focus:ring-0" type="checkbox"/>
<span class="text-outline group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="text-primary/70 hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-primary-container to-primary text-on-primary py-4 rounded-[10px] font-headline font-bold uppercase tracking-[0.15em] text-xs hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                        Sign In
                    </button>
</div>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label text-[9px] uppercase tracking-[0.3em] text-outline/50">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Action -->
<button class="w-full ghost-border bg-white/5 py-4 rounded-[10px] font-headline font-semibold uppercase tracking-[0.1em] text-[11px] flex items-center justify-center space-x-3 hover:bg-white/10 transition-colors" type="button">
<svg class="w-4 h-4" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
<span>Continue with Google</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-12 text-center">
<p class="font-label text-xs text-outline">
                    Don't have an account? 
                    <a class="text-primary font-semibold ml-1 hover:underline underline-offset-4 decoration-primary/30 transition-all" href="#">Request access</a>
</p>
</div>
</div>
<!-- Background Image Element (Implicit Editorial Detail) -->
<div class="absolute inset-0 -z-10 opacity-30">
<img alt="" class="w-full h-full object-cover" data-alt="Abstract macro shot of silk fabric folds in deep obsidian black with subtle golden thread details and soft directional lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdw42cpMmB6A6jinFe-WcPPELD7jxPBlQV1gAKcCpz3dnO94DXvO0IyAo743GoMZH2ZZIeef7t-1fhJ1fLGzcwzZnECwP6NUlFmP5dB3IrZIFNSTG5iQNiXc-fQ63HKY8hQispHCn8a4euqRs1MY8JjTitMZZJMWTHXuQpzDqtDnrZBDsCy_qgIdN6pvFmkqV9-YSECSHq4B9rU9MB-x1zZl5EtIQGntSJ2JD2r8sEzm1bjsItr-IgilpegujhNHlkn761ZCfRy-po"/>
</div>
<!-- Decorative Branding Element -->
<div class="absolute bottom-12 right-12 hidden lg:block opacity-40">
<div class="flex flex-col items-end space-y-4">
<div class="w-32 h-[1px] bg-primary/40"></div>
<p class="font-['JetBrains_Mono'] text-[9px] uppercase tracking-[0.5em] text-primary">The Digital Atelier</p>
<p class="font-['JetBrains_Mono'] text-[9px] uppercase tracking-[0.3em] text-outline">v2.04 — AI CURATED</p>
</div>
</div>
</main>
<!-- Navigation suppression check: Sign In is transactional/focused, hiding global nav shells -->
</body></html>
