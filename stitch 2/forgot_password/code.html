<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ghost-border {
            border: 0.5px solid rgba(196, 151, 62, 0.2);
        }
        .bg-obsidian {
            background-color: #09090B;
        }
        .floating-label-input:focus-within label,
        .floating-label-input input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #f0bf62;
        }

<body class="bg-obsidian text-on-surface font-body min-h-screen flex items-center justify-center overflow-hidden">
<!-- Decorative Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[20%] left-[15%] w-96 h-96 bg-primary/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[20%] right-[10%] w-[500px] h-[500px] bg-secondary-container/20 rounded-full blur-[150px]"></div>
<div class="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-full h-full opacity-20">
<div class="w-full h-full" style="background: radial-gradient(circle, rgba(196,151,62,0.1) 0%, transparent 70%);"></div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-6">
<!-- Glass Card Container -->
<div class="bg-surface-container/40 backdrop-blur-xl rounded-[24px] ghost-border p-10 md:p-12 flex flex-col items-center">
<!-- Brand Mark -->
<div class="mb-10 text-center">
<span class="font-display italic text-3xl tracking-tighter text-primary">Lumiqe</span>
</div>
<!-- Header Section -->
<div class="w-full mb-12">
<h1 class="font-display italic text-4xl md:text-5xl text-on-surface text-center mb-4 leading-tight">
                    Reset Password
                </h1>
<p class="font-label text-xs uppercase tracking-[0.2em] text-outline text-center">
                    Enter your email to receive a recovery link
                </p>
</div>
<!-- Form Section -->
<form action="#" class="w-full space-y-10" method="POST">
<!-- Email Input with Floating Label -->
<div class="relative floating-label-input group">
<input class="block w-full px-0 py-3 bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary transition-colors duration-300 text-on-surface font-body" id="email" name="email" placeholder=" " type="email"/>
<label class="absolute left-0 top-3 text-outline font-label text-sm pointer-events-none transition-all duration-300 uppercase tracking-widest" for="email">
                        Email Address
                    </label>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-r from-primary-container to-primary text-on-primary font-headline font-bold text-xs uppercase tracking-[0.2em] rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                        Send Reset Link
                    </button>
</div>
<!-- Footer Navigation -->
<div class="flex flex-col items-center space-y-4 pt-4">
<a class="font-mono text-[10px] text-primary hover:text-white transition-colors uppercase tracking-tighter" href="#">
                        Back to secure login
                    </a>
</div>
</form>
</div>
<!-- System Status / AI Tag (Editorial Detail) -->
<div class="mt-8 flex justify-center items-center gap-3">
<span class="h-px w-8 bg-outline-variant/30"></span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-secondary" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
<span class="font-mono text-[9px] text-outline uppercase tracking-widest">Secured by Lumiqe AI Intelligence</span>
</div>
<span class="h-px w-8 bg-outline-variant/30"></span>
</div>
</main>
<!-- Visual Polish: Ghost images for context if needed, but keeping it clean for Auth -->
<div class="fixed bottom-12 left-12 hidden lg:block opacity-40">
<div class="w-32 h-48 rounded-xl overflow-hidden ghost-border rotate-[-6deg]">
<img class="w-full h-full object-cover" data-alt="high fashion editorial photography of a silk garment in soft golden lighting with dramatic shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWl4ts60vwtVmsjz1iaUtV3Gd5ke_ahBqHpUL9bRDmZ-G727XNhYoKruogTM5v1la8gu7eyk6UqoWfGhzbNvafehEL0iHvDaQ4BxP9DisqprnlRwy8UwJXLi0Y8y_10Ww0KsHWJm4Oc-BakNJCTTFL7a9wMGHoHXcKwjygd5mNyyNaUJcSdbVaUNyRvHt0jIwJY8oedwG52CMi6S9Rj7f08eGR348DFgz-hnQHwt39mcii0vcJTfrahVHXf4m8Zp-QkEnIyCm2WQFz"/>
</div>
</div>
