<html class="dark"><head>

                        "on-error": "#690005",

                        "surface-container": "#201f22",

            }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .ghost-border {
            border: 0.5px solid rgba(196, 151, 62, 0.2);
        }
        .glass-effect {
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-[#09090B] text-on-surface font-body overflow-hidden">
<!-- TopNavBar Suppression Check: Suppressed for Error Page (Task-Focused) -->
<main class="relative min-h-screen flex items-center justify-center overflow-hidden">
<!-- Ambient Decorative Background Element -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Large Decorative 404 Background Text -->
<div class="absolute inset-0 flex items-center justify-center select-none pointer-events-none z-0">
<h1 class="font-display italic text-[40vw] leading-none text-primary opacity-[0.03] tracking-tighter">404</h1>
</div>
<!-- Main Content Card -->
<div class="relative z-10 max-w-xl w-full px-6">
<div class="ghost-border bg-surface-container/60 glass-effect p-12 md:p-20 flex flex-col items-center text-center rounded-[24px] shadow-[0_-10px_40px_rgba(196,151,62,0.03)]">
<!-- Brand Anchor -->
<div class="mb-12">
<span class="font-display italic text-3xl tracking-tighter text-primary">Lumiqe</span>
</div>
<!-- Editorial Headline -->
<h2 class="font-display text-4xl md:text-5xl lg:text-6xl text-white mb-6 tracking-tight">
                    The atelier is lost
                </h2>
<!-- Error Description -->
<div class="space-y-4 mb-12">
<p class="text-on-surface-variant font-light text-lg leading-relaxed max-w-md">
                        The silhouette you are seeking has vanished from our seasonal archive. Perhaps the thread was broken or the collection has moved.
                    </p>
<p class="font-mono text-[10px] text-primary uppercase tracking-[0.2em] opacity-60">
                        Error Code: 0x404_NULL_REFERENCE
                    </p>
</div>
<!-- Action Button -->
<a class="group relative inline-flex items-center justify-center px-10 py-4 bg-primary-container hover:bg-primary-container/90 text-on-primary font-headline font-bold text-xs uppercase tracking-widest transition-all duration-300 rounded-[10px]" href="#">
<span class="relative z-10">Return to Atelier</span>
<span class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span>
</a>
<!-- Fine Print Link -->
<div class="mt-12">
<a class="font-label text-[10px] text-on-surface-variant/50 hover:text-primary uppercase tracking-widest transition-colors duration-300" href="#">
                        Contact Style Concierge
                    </a>
</div>
</div>
</div>
<!-- Secondary Decorative Element: Ghost Image Fragment -->
<div class="absolute bottom-0 right-0 w-1/3 h-1/2 opacity-20 pointer-events-none z-0 hidden lg:block">
<img alt="Luxury fashion" class="w-full h-full object-cover grayscale brightness-50" data-alt="Monochrome close-up of a draped silk fabric with deep shadows and soft highlights, high-fashion editorial texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHEH2sZybmVwdvfLD3CdsYk9T_Z61QPrOQcWx25sn9RInxOLS8ppm71KoUqQO_29zzi_TQce_Pff-n1cyPVLYARSvqR6WmNj9QA9wImbmb-79Mc0g-UBhClzFVTriy-oSOicjy4wvcUHOrT4st-8wMGscN2Mv-PwT_lMreuYIXlwdSsT0Xxmm2LiO7kVxG8ZGF6FVA8qiGNeHl5IaXMhb4S2z2itplr_NXV-H2P39q9UQEz-KmrWEVWqydNASDrohfK7KedaF66d7K"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#09090B] via-transparent to-transparent"></div>
<div class="absolute inset-0 bg-gradient-to-l from-[#09090B] via-transparent to-transparent"></div>
</div>
</main>
<!-- BottomNavBar Suppression Check: Suppressed for Error Page (Linear/Dead End) -->
<!-- Ambient Texture Layer -->
<div class="fixed inset-0 pointer-events-none z-50 opacity-[0.15] mix-blend-overlay">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<filter id="noise">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
<fecolormatrix type="saturate" values="0"></fecolormatrix>
</filter>
<rect filter="url(#noise)" height="100%" width="100%"></rect>
</svg>
</div>
</body></html>
