# Sealed Secrets — Encrypted secrets that are safe to commit to git.
#
# Prerequisites:
#   1. Install sealed-secrets controller:
#      kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.27.3/controller.yaml
#   2. Install kubeseal CLI:
#      brew install kubeseal  (or download from GitHub releases)
#
# Usage:
#   1. Create a regular Secret YAML (DO NOT commit this):
#      kubectl create secret generic lumiqe-secrets \
#        --from-literal=JWT_SECRET_KEY=your-key \
#        --from-literal=STRIPE_SECRET_KEY=sk_live_xxx \
#        --from-literal=GOOGLE_CLIENT_SECRET=xxx \
#        --dry-run=client -o yaml > /tmp/lumiqe-secrets.yaml
#
#   2. Seal it with kubeseal:
#      kubeseal --format=yaml < /tmp/lumiqe-secrets.yaml > k8s/sealed-secrets.yaml
#
#   3. Apply the sealed secret:
#      kubectl apply -f k8s/sealed-secrets.yaml
#
#   4. Delete the plaintext file:
#      rm /tmp/lumiqe-secrets.yaml
#
# The sealed-secrets controller will decrypt the SealedSecret and create
# a regular Secret in the cluster. Only the controller's private key can
# decrypt — the sealed version is safe in version control.
#
# ──────────────────────────────────────────────────────────────
# PLACEHOLDER: Replace this with actual kubeseal output.
# Run the commands above to generate the encrypted version.
# ──────────────────────────────────────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lumiqe-secrets
  namespace: default
spec:
  encryptedData:
    # These values must be generated by kubeseal — placeholders shown here
    JWT_SECRET_KEY: "REPLACE_WITH_KUBESEAL_OUTPUT"
    DATABASE_URL: "REPLACE_WITH_KUBESEAL_OUTPUT"
    REDIS_URL: "REPLACE_WITH_KUBESEAL_OUTPUT"
    STRIPE_SECRET_KEY: "REPLACE_WITH_KUBESEAL_OUTPUT"
    STRIPE_WEBHOOK_SECRET: "REPLACE_WITH_KUBESEAL_OUTPUT"
    GOOGLE_CLIENT_ID: "REPLACE_WITH_KUBESEAL_OUTPUT"
    GOOGLE_CLIENT_SECRET: "REPLACE_WITH_KUBESEAL_OUTPUT"
    RESEND_API_KEY: "REPLACE_WITH_KUBESEAL_OUTPUT"
    GROQ_API_KEY: "REPLACE_WITH_KUBESEAL_OUTPUT"
  template:
    metadata:
      name: lumiqe-secrets
      namespace: default
