apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumiqe-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lumiqe-backend
  template:
    metadata:
      labels:
        app: lumiqe-backend
    spec:
      containers:
      - name: backend
        image: lumiqe/backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: lumiqe-secrets
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lumiqe-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lumiqe-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: lumiqe-backend-svc
spec:
  selector:
    app: lumiqe-backend
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
