apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumiqe-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lumiqe-frontend
  template:
    metadata:
      labels:
        app: lumiqe-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: frontend
        image: lumiqe/frontend:0.1.0
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lumiqe-frontend-svc
spec:
  selector:
    app: lumiqe-frontend
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumiqe-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - lumiqe.in
    - api.lumiqe.in
    secretName: lumiqe-tls
  rules:
  - host: lumiqe.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lumiqe-frontend-svc
            port:
              number: 80
  - host: api.lumiqe.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lumiqe-backend-svc
            port:
              number: 80
