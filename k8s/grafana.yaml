apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
      - name: grafana
        image: grafana/grafana:11.5.2
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lumiqe-secrets
              key: GRAFANA_ADMIN_PASSWORD
              optional: true
        - name: GF_SERVER_ROOT_URL
          value: "https://grafana.lumiqe.in"
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboards-config
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
        - name: data
          mountPath: /var/lib/grafana
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: dashboards-config
        configMap:
          name: grafana-dashboards-config
      - name: dashboards
        configMap:
          name: grafana-dashboards
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-svc:9090
      isDefault: true
      access: proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: default
      folder: Lumiqe
      type: file
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  lumiqe-overview.json: |
    {
      "dashboard": {
        "title": "Lumiqe Overview",
        "panels": [
          {
            "title": "Request Rate",
            "type": "timeseries",
            "targets": [{"expr": "rate(lumiqe_requests_total[5m])"}],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
          },
          {
            "title": "Error Rate",
            "type": "timeseries",
            "targets": [{"expr": "rate(lumiqe_errors_total[5m])"}],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "title": "Response Time P95",
            "type": "gauge",
            "targets": [{"expr": "histogram_quantile(0.95, rate(lumiqe_response_seconds_bucket[5m]))"}],
            "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}
          },
          {
            "title": "Uptime",
            "type": "stat",
            "targets": [{"expr": "lumiqe_uptime_seconds / 3600"}],
            "gridPos": {"h": 8, "w": 4, "x": 8, "y": 8}
          },
          {
            "title": "Active Pods",
            "type": "stat",
            "targets": [{"expr": "count(up{job='lumiqe-backend'})"}],
            "gridPos": {"h": 8, "w": 4, "x": 12, "y": 8}
          },
          {
            "title": "CV Pipeline Duration",
            "type": "timeseries",
            "targets": [{"expr": "histogram_quantile(0.95, rate(lumiqe_response_seconds_bucket[5m]))"}],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16}
          }
        ],
        "time": {"from": "now-1h", "to": "now"},
        "refresh": "10s"
      }
    }
  alerting-rules.json: |
    {
      "groups": [
        {
          "name": "lumiqe-alerts",
          "rules": [
            {
              "alert": "HighErrorRate",
              "expr": "rate(lumiqe_errors_total[5m]) > 0.1",
              "for": "2m",
              "labels": {"severity": "critical"},
              "annotations": {"summary": "Error rate exceeds 10% for 2+ minutes"}
            },
            {
              "alert": "HighLatency",
              "expr": "histogram_quantile(0.95, rate(lumiqe_response_seconds_bucket[5m])) > 3",
              "for": "5m",
              "labels": {"severity": "warning"},
              "annotations": {"summary": "P95 latency exceeds 3s SLA for 5+ minutes"}
            },
            {
              "alert": "PodDown",
              "expr": "up{job='lumiqe-backend'} == 0",
              "for": "1m",
              "labels": {"severity": "critical"},
              "annotations": {"summary": "Backend pod is down"}
            }
          ]
        }
      ]
    }
