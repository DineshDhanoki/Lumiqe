name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint, Type Check & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=high
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Run tests with coverage
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary
      - name: Check frontend coverage threshold
        run: |
          node -e "
            const r = require('./coverage/coverage-summary.json').total;
            const pct = r.lines.pct;
            console.log('Frontend line coverage: ' + pct + '%');
            if (pct < 50) { console.error('Coverage below 50% threshold'); process.exit(1); }
          "

  backend:
    name: Backend — Lint, Conflict Check & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lumiqe_test
          POSTGRES_PASSWORD: lumiqe_test
          POSTGRES_DB: lumiqe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lumiqe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://lumiqe_test:lumiqe_test@localhost:5432/lumiqe_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-key-for-testing-only-must-be-32-chars-minimum
      DEBUG: "false"
      CELERY_ALWAYS_EAGER: "true"
      CELERY_BROKER_URL: "memory://"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Check for unresolved merge conflict markers
        run: |
          if grep -rn "<<<<<<\|>>>>>>\|=======" app/ --include="*.py"; then
            echo "ERROR: Unresolved merge conflict markers found"
            exit 1
          fi
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest pytest-asyncio httpx hypothesis pytest-timeout pytest-cov
      - name: Audit Python dependencies for vulnerabilities
        run: |
          pip install pip-audit
          pip-audit --strict --desc
      - name: Run tests with coverage
        timeout-minutes: 10
        run: >-
          pytest tests/ -x -q --tb=short --timeout=30
          -p no:warnings
          --cov=app --cov-report=term --cov-report=json
      - name: Check backend coverage threshold
        run: |
          python -c "
          import json, sys
          data = json.load(open('coverage.json'))
          pct = data['totals']['percent_covered']
          print(f'Backend line coverage: {pct:.1f}%')
          if pct < 40:
              print('Coverage below 40% threshold')
              sys.exit(1)
          "
